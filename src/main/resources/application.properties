# ?? Server ????????????????????????????????????????????????????????????????????
server.port=8080

# ?? File Upload ???????????????????????????????????????????????????????????????
# Allow large APK uploads (increase if needed)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ?? Android Platforms ?????????????????????????????????????????????????????????
# Override this with your actual path to Android SDK platforms/
android.platforms.path=C:/Android/platforms

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.org.sri=INFO
logging.level.org.springframework.web=INFO